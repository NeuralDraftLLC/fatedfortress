# supabase/config.toml — local dev configuration for Supabase CLI.
#
# Docs: https://supabase.com/docs/guides/local-development/cli/config
#
# PRODUCTION values (project_id, JWT secrets, Stripe keys, etc.) are managed
# in the Supabase dashboard and Railway environment variables, NOT here.
# This file is safe to commit — it contains no secrets.

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
# Realtime is used on: /reviews (queue), /project/:id (wallet + audit feed)
# Channels: review-queue, project-detail-{id}
# Tables that must have replica identity FULL for Realtime to work:
#   tasks, project_wallet, audit_log, submissions
# Run in Supabase SQL editor if not already set:
#   ALTER TABLE public.tasks          REPLICA IDENTITY FULL;
#   ALTER TABLE public.project_wallet REPLICA IDENTITY FULL;
#   ALTER TABLE public.audit_log      REPLICA IDENTITY FULL;
#   ALTER TABLE public.submissions    REPLICA IDENTITY FULL;

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/auth/callback",
  "https://fatedfortress.app/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1s"

[auth.email.template.magic_link]
subject = "Your FatedFortress sign-in link"
content_path = "./supabase/templates/magic_link.html"

[auth.sms]
enable_signup = false

[auth.external.github]
enabled = true
client_id = "env(AUTH_GITHUB_CLIENT_ID)"
secret = "env(AUTH_GITHUB_SECRET)"
# Redirect: https://<project-ref>.supabase.co/auth/v1/callback

[auth.external.google]
enabled = true
client_id = "env(AUTH_GOOGLE_CLIENT_ID)"
secret = "env(AUTH_GOOGLE_SECRET)"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

# Edge functions — one [[functions]] block per function.
# The slug must match the directory name under supabase/functions/.

[[functions]]
name = "asset-scanner"
enabled = true
verify_jwt = true

[[functions]]
name = "auto-release"
enabled = true
verify_jwt = false  # invoked by pg_cron / service role

[[functions]]
name = "claim-task"
enabled = true
verify_jwt = true

[[functions]]
name = "create-and-scope-project"
enabled = true
verify_jwt = true

[[functions]]
name = "create-payment-intent"
enabled = true
verify_jwt = true

[[functions]]
name = "expire-claims"
enabled = true
verify_jwt = false  # invoked by pg_cron / service role

[[functions]]
name = "get-stripe-status"
enabled = true
verify_jwt = true

[[functions]]
name = "github-oauth"
enabled = true
verify_jwt = false  # handles OAuth callback before session exists

[[functions]]
name = "review-submission"
enabled = true
verify_jwt = true

[[functions]]
name = "scope-tasks"
enabled = true
verify_jwt = false  # tombstone — always returns 410

[[functions]]
name = "stripe-connect-link"
enabled = true
verify_jwt = true

[[functions]]
name = "stripe-connect-onboard"
enabled = true
verify_jwt = true

[[functions]]
name = "stripe-payment"
enabled = true
verify_jwt = true

[[functions]]
name = "stripe-webhook"
enabled = true
verify_jwt = false  # Stripe signs with its own secret

[[functions]]
name = "submit-task"
enabled = true
verify_jwt = true

[[functions]]
name = "supabase-storage-upload"
enabled = true
verify_jwt = true

[[functions]]
name = "verify-submission"
enabled = true
verify_jwt = true

[analytics]
enabled = false
