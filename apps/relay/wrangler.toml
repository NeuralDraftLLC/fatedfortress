# apps/relay/wrangler.toml
name = "fortress-relay"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayDO"

[[durable_objects.bindings]]
name = "RELAY_REGISTRY"
class_name = "RelayRegistryDO"

# Required for Durable Object class deployments.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayDO", "RelayRegistryDO"]

# ── TURN ─────────────────────────────────────────────────────────────────────
# TURN_KEY_ID and TURN_KEY_API_TOKEN are Wrangler secrets — never add them here.
# Run:
#   wrangler secret put TURN_KEY_ID
#   wrangler secret put TURN_KEY_API_TOKEN

# ── Submission surface checker ────────────────────────────────────────────────
# GITHUB_TOKEN is a Wrangler secret used by POST /verify-submission to check PR existence.
# Run:
#   wrangler secret put GITHUB_TOKEN

[vars]
# Lock /turn-credentials and /verify-submission CORS to the SPA origin.
WEB_ORIGIN = "https://fatedfortress.com"
