<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatedFortress</title>
  <!-- L3: Per-request nonces belong on the edge (see deploy worker). SPA uses script-src 'self' for Vite-hashed /assets/*.js. -->
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self';
  style-src 'self' 'unsafe-inline';
  worker-src 'self';
  connect-src 'self'
    https://*.supabase.co
    wss://*.supabase.co
    https://api.openai.com
    https://api.anthropic.com
    https://generativelanguage.googleapis.com
    https://api.groq.com
    https://api.minimax.chat
    https://openrouter.ai
    https://relay.fatedfortress.com
    ws://localhost:*
    wss://localhost:*
    wss://relay.fatedfortress.com;
  img-src 'self' data: https:;
">
  <link rel="stylesheet" href="/fonts/geist-mono.css">
  <link rel="stylesheet" href="/fonts/iosevka.css">
</head>
<body class="ff-body">
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
