<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FatedFortress</title>
  <!-- TODO: replace 'unsafe-inline' in style-src with nonces/hashes once CSS is extracted -->
  <meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self';
  style-src 'self' 'unsafe-inline';
  worker-src 'self';
  connect-src 'self'
    https://api.openai.com
    https://api.anthropic.com
    https://generativelanguage.googleapis.com
    https://api.groq.com
    https://api.minimax.chat
    https://openrouter.ai
    ws://localhost:*
    wss://localhost:*
    wss://relay.fatedfortress.com;
  frame-src https://keys.fatedfortress.com;
  img-src 'self' data: https:;
">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/styles/global.css">
</head>
<body class="ff-body">
  <div id="app"></div>
  <!-- Keystore worker iframe mounts into #ff-keystore-slot (see worker-bridge). -->
  <footer class="ff-keystore-boundary" aria-label="Cryptographic trust boundary">
    <div class="ff-keystore-boundary__inner">
      <span class="ff-keystore-boundary__glyph" aria-hidden="true">┄</span>
      <span class="ff-keystore-boundary__label">
        <span class="ff-keystore-boundary__kbd">KEYSTORE</span>
        <span class="ff-keystore-boundary__sep">·</span>
        isolated iframe worker
        <span class="ff-keystore-boundary__sep">·</span>
        keys never touch main thread memory
      </span>
      <span class="ff-keystore-boundary__glyph" aria-hidden="true">┄</span>
    </div>
    <div id="ff-keystore-slot" class="ff-keystore-slot" aria-hidden="true"></div>
  </footer>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
