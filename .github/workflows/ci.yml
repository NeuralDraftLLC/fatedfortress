# .github/workflows/ci.yml
# Runs on every push and pull-request to main.
#
# Jobs (in logical dependency order):
#   1. typecheck   — tsc --noEmit across the monorepo
#   2. lint        — eslint apps/web + packages
#   3. build       — vite build (smoke-test bundler)
#   4. migrations  — supabase db push --dry-run (schema drift guard)
#
# Secrets required (set in repo Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN   — personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD    — database password for the linked project
#   SUPABASE_PROJECT_REF    — project ref slug (e.g. abcdefghijklmnopqrst)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Type-check
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit (web)
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: tsc --noEmit (protocol)
        run: npx tsc --noEmit --project packages/protocol/tsconfig.json

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint apps/web/src --ext .ts,.tsx --max-warnings 0

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Build
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build --workspace=apps/web
        env:
          # Vite public env vars — values are empty strings here because
          # we only want a bundler smoke-test, not a real deployment.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Migration dry-run  (schema drift guard)
  # ──────────────────────────────────────────────────────────────────────────
  migrations:
    name: Migration dry-run
    runs-on: ubuntu-latest
    # Only run on push to main (not every PR — avoids leaking secrets to forks)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Dry-run db push (no DDL executed)
        run: supabase db push --dry-run
